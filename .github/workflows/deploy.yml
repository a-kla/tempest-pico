name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      ### No need to generate the pages, they are in the repro now now 

      # - name: Setup Node.js
      #   uses: actions/setup-node@v6
      #   with:
      #     node-version: '24'
      #     cache: 'pnpm'

      # - name: Install Node dependencies
      #   run: pnpm install

      # - name: Setup PHP
      #   uses: shivammathur/setup-php@v2
      #   with:
      #     php-version: '8.4'
      #     tools: composer

      # - name: Install PHP dependencies
      #   run: composer install --no-progress --prefer-dist --optimize-autoloader

      # - name: Generate static site
      #   run:  ./tempest static:generate && pnpm unocss

      # - name: Prepare pages
      #   run: |
      #     mkdir -p _site
      #     cp -r public/* _site/
      #     find _site -name "*.php" -type f -delete

      - name: delete Php
        run: |
          find public -name "*.php" -type f -delete

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # path: _site
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4