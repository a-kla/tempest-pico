php-version = "8.4.0"

[source]
paths = ['src', "tests"]
includes = ["vendor"]
excludes = [
  "src/*/*.view.php",
  "./vendor/symfony/cache/Traits/ValueWrapper.php",
  "./vendor/composer",
]

[formatter]
print-width = 180
tab-width = 4
use-tabs = false
null-type-hint = "question"
space-before-arrow-function-parameter-list-parenthesis = true
space-after-logical-not-unary-prefix-operator = true
always-break-named-arguments-list = false
preserve-breaking-member-access-chain = true
preserve-breaking-argument-list = true
preserve-breaking-array-like = true
preserve-breaking-parameter-list = true
preserve-breaking-attribute-list = true
preserve-breaking-conditional-expression = true

[linter.rules]
tagged-fixme = { enabled = false }
tagged-todo = { enabled = false }
literal-named-argument = { enabled = false }
function-name = { enabled = false }

[analyzer]
analyze-dead-code = true
ignore = [ "literal-named-argument", "implicit-to-string-cast", "invalid-argument" ]
# FIXME: ignore = invalid-argument -> MAGO don't know global type alias nor type-import?
# Mago does not currently support reading type aliases from PHPStan's phpstan.neon configuration file.
# Mago see them as `unknown-ref(T)` and rise a `invalid-argument` errors

